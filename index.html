<!-- JAVASCRIPT LOGIC ENGINE -->
    <script>
        // Configuración de Categorías unificadas
        const marketingCategories = {
            "eventos": { label: "Eventos", color: "bg-[#eccfe8]", light: "bg-[#fcf0fa] border-[#f9e1f5]", labelStyle: "text-[#86198f] bg-[#eccfe8]", textColor: "text-[#86198f]" },
            "campanas": { label: "Campañas", color: "bg-[#fef08a]", light: "bg-[#fefce8] border-[#fef08a]", labelStyle: "text-[#854d0e] bg-[#fef9c3]", textColor: "text-[#a16207]" },
            "podcast-capsulas": { label: "Podcast/Cápsulas", color: "bg-[#dbeafe]", light: "bg-[#f0f9ff] border-[#dbeafe]", labelStyle: "text-[#1e40af] bg-[#dbeafe]", textColor: "text-[#1e40af]" },
            "informes": { label: "Informes", color: "bg-[#93c5fd]", light: "bg-[#f0f7ff] border-[#93c5fd]", labelStyle: "text-[#1e3a8a] bg-[#bfdbfe]", textColor: "text-[#1e3a8a]" },
            "auspicios": { label: "Auspicios", color: "bg-[#c1f0c2]", light: "bg-[#f6fff6] border-[#c1f0c2]", labelStyle: "text-[#065f46] bg-[#d1fad3]", textColor: "text-[#065f46]" }
        };

        const holidays2026 = {
            "2026-01-01": "Año Nuevo", "2026-04-03": "Viernes Santo", "2026-04-04": "Sábado Santo", "2026-05-01": "Día del Trabajo", "2026-05-21": "Glorias Navales", "2026-06-21": "Día Pueblos Indígenas", "2026-06-29": "San Pedro y San Pablo", "2026-07-16": "Virgen del Carmen", "2026-08-15": "Asunción de la Virgen", "2026-09-18": "Fiestas Patrias", "2026-09-19": "Glorias del Ejército", "2026-10-12": "Encuentro Dos Mundos", "2026-10-31": "Día Iglesias Evangélicas", "2026-11-01": "Día de Todos los Santos", "2026-12-08": "Inmaculada Concepción", "2026-12-25": "Navidad"
        };

        const segmentList = ["BAM", "BCB", "Private Banking", "Afluente", "Masivo", "Interno", "Institucionales BAM", "Institucionales BCB"];

        // 1. Enlace CSV para LEER los datos (Evade el bloqueo corporativo)
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR63S85QZJFfv6tbxfZ_6A4-ohAtyVaZA0XpictILkrzlLbJsipRYKRdecL_63TggErBiDC1_mmtlFz/pub?gid=84568461&single=true&output=csv";
        
        // 2. Enlace API para ESCRIBIR nuevos datos (Guardar)
        const APPS_SCRIPT_URL = "https://script.google.com/a/macros/bci.cl/s/AKfycbzcbNP_nKbf6kBE7BRxVj8Q9E_0DCycZS2l2AkrfY4vejbLGJkt108jx5LZXtcM6liwgA/exec";

        let events = []; 
        let currentDate = new Date(2026, 5, 1);
        let currentView = "calendar";
        let selectedEventId = null;
        let eventIdToDelete = null;

        let activeFilters = {
            search: "",
            categories: Object.keys(marketingCategories),
            segments: [...segmentList]
        };

        window.onload = function() {
            initFilterPanels();
            cargarDatosDesdeSheets();
        };

        function cargarDatosDesdeSheets() {
            showToast("Cargando datos desde Drive...", "info");

            // AHORA SÍ USAREMOS PAPA PARSE PARA LEER EL CSV ANTI-BLOQUEO
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                transformHeader: function(header) {
                    return header.trim().toLowerCase(); // Convierte tus títulos en inglés a minúsculas
                },
                complete: function(results) {
                    console.log("Datos recibidos del Excel:", results.data);

                    events = results.data.map((row, index) => {
                        let rawCategory = (row["category"] || "otros").toLowerCase().trim();
                        if(rawCategory === "campañas" || rawCategory === "campaña") rawCategory = "campanas";
                        
                        let costoString = (row["cost"] || "0").toString().replace(/\D/g,'');

                        return {
                            id: row["id"] || "ev_csv_" + index,
                            title: row["title"] || "Sin título",
                            date: row["date"] || "",
                            category: rawCategory,
                            segment: (row["segment"] || "").trim(),
                            location: row["location"] || "",
                            responsable: row["responsable"] || "",
                            contraparte: row["contraparte"] || "",
                            description: row["description"] || "",
                            cost: parseInt(costoString) || 0,
                            invitados: parseInt(row["invitados"]) || 0,
                            medicionType: row["mediciontype"] || "",
                            medicionValue: row["medicionvalue"] || "",
                            media: []
                        };
                    });

                    updateDashboard();
                    showToast("Datos sincronizados exitosamente", "success");
                },
                error: function(err) {
                    console.error("Error leyendo el CSV:", err);
                    showToast("Error de conexión. Cargando respaldo...", "error");
                    loadResilientLocalBackup(); 
                }
            });
        }

        function loadResilientLocalBackup() {
            const keysToTry = ["bci_mkt_consolidado_2026_v4_0", "bci_mkt_consolidado_2026_v3_1", "bci_mkt_consolidado_2026_v3_0"];
            let loadedEvents = null;
            for (let key of keysToTry) {
                const rawData = localStorage.getItem(key);
                if (rawData) {
                    try {
                        const parsed = JSON.parse(rawData);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            loadedEvents = parsed;
                            break;
                        }
                    } catch(err) { }
                }
            }

            if (loadedEvents) events = loadedEvents;
            updateDashboard();
        }

        function saveStateToLocalStorage() {
            const serialized = JSON.stringify(events);
            const keysToSave = ["bci_mkt_consolidado_2026_v4_0", "bci_mkt_consolidado_2026_v3_1", "bci_mkt_consolidado_2026_v3_0"];
            keysToSave.forEach(key => localStorage.setItem(key, serialized));
        }

        function isToday(dateStr) {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return dateStr === `${yyyy}-${mm}-${dd}`;
        }

        function initFilterPanels() {
            const catContainer = document.getElementById("category-filters");
            catContainer.innerHTML = "";
            Object.keys(marketingCategories).forEach(key => {
                const cat = marketingCategories[key];
                catContainer.innerHTML += `
                    <label class="flex items-center space-x-2.5 text-xs font-semibold text-slate-700 cursor-pointer select-none">
                        <input type="checkbox" checked value="${key}" onchange="toggleCategoryFilter('${key}')" class="rounded text-blue-600 focus:ring-blue-500 h-4.5 w-4.5">
                        <span class="w-3.5 h-3.5 rounded ${cat.color}"></span>
                        <span>${cat.label}</span>
                    </label>
                `;
            });

            const segmentsContainer = document.getElementById("segment-filters");
            segmentsContainer.innerHTML = "";
            segmentList.forEach(seg => {
                segmentsContainer.innerHTML += `
                    <button id="seg-pill-${seg.replace(/\s+/g, '-')}" onclick="toggleSegmentFilter('${seg}')" class="px-3 py-1.5 rounded-full text-[10px] font-bold shadow-sm transition-all select-none focus:outline-none">
                        ${seg}
                    </button>
                `;
            });

            const legendFooter = document.getElementById("legend-footer");
            legendFooter.innerHTML = `<span class="font-bold text-slate-400 uppercase">Leyenda:</span>`;
            Object.keys(marketingCategories).forEach(key => {
                const cat = marketingCategories[key];
                legendFooter.innerHTML += `
                    <div class="flex items-center space-x-1.5 mr-2">
                        <span class="w-3 h-3 rounded ${cat.color}"></span>
                        <span class="text-slate-700 font-bold">${cat.label}</span>
                    </div>
                `;
            });

            updateSegmentPillStyles();
        }

        function updateSegmentPillStyles() {
            segmentList.forEach(seg => {
                const pill = document.getElementById(`seg-pill-${seg.replace(/\s+/g, '-')}`);
                if (pill) {
                    if (activeFilters.segments.includes(seg)) {
                        pill.classList.remove("border-slate-200", "bg-white", "text-slate-700", "border");
                        pill.classList.add("bg-bciSegmentBlue", "text-white");
                    } else {
                        pill.classList.remove("bg-bciSegmentBlue", "text-white");
                        pill.classList.add("border-slate-200", "bg-white", "text-slate-700", "border");
                    }
                }
            });
        }

        function toggleCategoryFilter(key) {
            const index = activeFilters.categories.indexOf(key);
            if (index > -1) activeFilters.categories.splice(index, 1);
            else activeFilters.categories.push(key);
            updateDashboard();
        }

        function toggleSegmentFilter(seg) {
            const index = activeFilters.segments.indexOf(seg);
            if (index > -1) activeFilters.segments.splice(index, 1);
            else activeFilters.segments.push(seg);
            updateSegmentPillStyles();
            updateDashboard();
        }

        function handleFilterChange() {
            activeFilters.search = document.getElementById("search-input").value.trim().toLowerCase();
            updateDashboard();
        }

        function resetFilters() {
            document.getElementById("search-input").value = "";
            activeFilters.search = "";
            activeFilters.categories = Object.keys(marketingCategories);
            activeFilters.segments = [...segmentList];
            
            const checkboxes = document.querySelectorAll('#category-filters input[type="checkbox"]');
            checkboxes.forEach(cb => cb.checked = true);
            
            updateSegmentPillStyles();
            updateDashboard();
            showToast("Filtros restablecidos", "success");
        }

        function getFilteredEvents() {
            return events.filter(e => {
                const matchSearch = activeFilters.search === "" || 
                    e.title.toLowerCase().includes(activeFilters.search) ||
                    (e.description && e.description.toLowerCase().includes(activeFilters.search)) ||
                    (e.location && e.location.toLowerCase().includes(activeFilters.search)) ||
                    (e.responsable && e.responsable.toLowerCase().includes(activeFilters.search)) ||
                    (e.contraparte && e.contraparte.toLowerCase().includes(activeFilters.search)) ||
                    (e.media && e.media.some(m => m.toLowerCase().includes(activeFilters.search)));
                
                const matchCategory = activeFilters.categories.includes(e.category);
                const matchSegment = activeFilters.segments.includes(e.segment);

                return matchSearch && matchCategory && matchSegment;
            });
        }

        function updateDashboard() {
            renderKPIs();
            if (currentView === "calendar") renderCalendar();
            else if (currentView === "list") renderList();
            else if (currentView === "charts") renderCharts();
        }

        function renderKPIs() {
            const filtered = getFilteredEvents();
            document.getElementById("kpi-total-activities").innerText = filtered.length;
            document.getElementById("kpi-total-events").innerText = filtered.filter(e => e.category === "eventos").length;
            document.getElementById("kpi-total-campaigns").innerText = filtered.filter(e => e.category === "campanas").length;
            document.getElementById("kpi-total-podcasts").innerText = filtered.filter(e => e.category === "podcast-capsulas").length;
            document.getElementById("kpi-total-reports").innerText = filtered.filter(e => e.category === "informes").length;
        }

        function renderCalendar() {
            const calendarGrid = document.getElementById("calendar-grid");
            calendarGrid.innerHTML = "";

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            document.getElementById("calendar-title").innerText = `${monthNames[month]} ${year}`;

            let firstDayIndex = new Date(year, month, 1).getDay();
            firstDayIndex = (firstDayIndex === 0) ? 6 : firstDayIndex - 1; 

            const lastDayDate = new Date(year, month + 1, 0).getDate();
            const prevLastDayDate = new Date(year, month, 0).getDate();

            const filteredEvents = getFilteredEvents();
            const eventsByDate = {};
            filteredEvents.forEach(ev => {
                eventsByDate[ev.date] = eventsByDate[ev.date] || [];
                eventsByDate[ev.date].push(ev);
            });

            for (let i = firstDayIndex; i > 0; i--) {
                const dayNum = prevLastDayDate - i + 1;
                const formattedMonth = String(month === 0 ? 12 : month).padStart(2, '0');
                const formattedYear = month === 0 ? year - 1 : year;
                const fullDateStr = `${formattedYear}-${formattedMonth}-${String(dayNum).padStart(2, '0')}`;
                calendarGrid.appendChild(createCalendarDayNode(dayNum, true, fullDateStr, []));
            }

            for (let i = 1; i <= lastDayDate; i++) {
                const fullDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const dayEvents = eventsByDate[fullDateStr] || [];
                calendarGrid.appendChild(createCalendarDayNode(i, false, fullDateStr, dayEvents));
            }

            const totalCells = firstDayIndex + lastDayDate;
            const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remainingCells; i++) {
                const formattedMonth = String(month === 11 ? 1 : month + 2).padStart(2, '0');
                const formattedYear = month === 11 ? year + 1 : year;
                const fullDateStr = `${formattedYear}-${formattedMonth}-${String(i).padStart(2, '0')}`;
                calendarGrid.appendChild(createCalendarDayNode(i, true, fullDateStr, []));
            }
        }

        function createCalendarDayNode(dayNum, isTrailing, dateString, dayEvents) {
            const cell = document.createElement("div");
            cell.className = `min-h-[120px] h-auto border border-slate-100 rounded-xl p-1.5 flex flex-col justify-between transition-all ${isTrailing ? 'bg-slate-50 opacity-40' : 'bg-white hover:bg-slate-50/50'}`;
            
            const header = document.createElement("div");
            header.className = "flex justify-between items-start";
            
            const numberLabel = document.createElement("span");
            numberLabel.innerText = dayNum;
            numberLabel.className = `text-[10px] font-bold px-1.5 py-0.5 rounded-md ${isToday(dateString) ? 'bg-bciLightBlue text-white shadow-sm' : 'text-slate-500'}`;
            header.appendChild(numberLabel);

            if (holidays2026[dateString]) {
                const holidayBadge = document.createElement("span");
                holidayBadge.className = "bg-red-50 text-red-600 text-[8px] font-extrabold px-1 py-0.5 rounded border border-red-100 uppercase tracking-tight truncate max-w-[80px]";
                holidayBadge.innerText = holidays2026[dateString];
                holidayBadge.title = `Feriado: ${holidays2026[dateString]}`;
                header.appendChild(holidayBadge);
            } else if (!isTrailing) {
                const addBtn = document.createElement("button");
                addBtn.innerHTML = `
                    <svg class="w-3.5 h-3.5 opacity-0 group-hover:opacity-100 text-slate-400 hover:text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path>
                    </svg>
                `;
                addBtn.className = "p-0.5 hover:bg-slate-200 rounded transition-all focus:outline-none";
                addBtn.onclick = (e) => {
                    e.stopPropagation();
                    openEventModalWithDate(dateString);
                };
                header.appendChild(addBtn);
                cell.classList.add("group");
            }
            cell.appendChild(header);

            const listWrapper = document.createElement("div");
            listWrapper.className = "flex flex-col gap-1 mt-1.5 w-full h-auto";
            
            dayEvents.forEach(ev => {
                const evNode = document.createElement("div");
                const catInfo = marketingCategories[ev.category] || { light: "bg-slate-100 border-slate-200 text-slate-700", label: "Otros" };
                
                evNode.className = `text-[9px] font-extrabold px-1.5 py-1 rounded-lg truncate cursor-pointer transition-all border shadow-2xs hover:shadow-xs ${catInfo.light} hover:-translate-y-0.5`;
                evNode.innerText = ev.title;
                evNode.title = `${ev.title} (${ev.segment})`;
                
                evNode.onclick = (e) => {
                    e.stopPropagation();
                    openDrawer(ev.id);
                };
                listWrapper.appendChild(evNode);
            });

            cell.appendChild(listWrapper);
            return cell;
        }

        function switchView(viewName) {
            currentView = viewName;
            
            const calendarView = document.getElementById("view-calendar");
            const listView = document.getElementById("view-list");
            const chartsView = document.getElementById("view-charts");
            
            const calendarBtn = document.getElementById("btn-view-calendar");
            const listBtn = document.getElementById("btn-view-list");
            const chartsBtn = document.getElementById("btn-view-charts");

            calendarView.classList.add("hidden");
            listView.classList.add("hidden");
            chartsView.classList.add("hidden");

            calendarBtn.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-600 hover:text-slate-900";
            listBtn.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-600 hover:text-slate-900";
            chartsBtn.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-600 hover:text-slate-900";

            if (viewName === "calendar") {
                calendarView.classList.remove("hidden");
                calendarBtn.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white text-slate-900 shadow-sm";
            } else if (viewName === "list") {
                listView.classList.remove("hidden");
                listBtn.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white text-slate-900 shadow-sm";
            } else if (viewName === "charts") {
                chartsView.classList.remove("hidden");
                chartsBtn.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white text-slate-900 shadow-sm";
            }

            updateDashboard();
        }

        function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); updateDashboard(); }
        function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); updateDashboard(); }

        function renderList() {
            const tableBody = document.getElementById("list-table-body");
            const emptyState = document.getElementById("list-empty-state");
            tableBody.innerHTML = "";

            const filtered = getFilteredEvents();
            filtered.sort((a, b) => new Date(a.date) - new Date(b.date));

            if (filtered.length === 0) {
                emptyState.classList.remove("hidden");
                return;
            }
            emptyState.classList.add("hidden");

            filtered.forEach(ev => {
                const tr = document.createElement("tr");
                tr.className = "border-b border-slate-100 hover:bg-slate-50 transition-all font-medium text-slate-700";
                
                const catInfo = marketingCategories[ev.category] || { label: "Otros", labelStyle: "text-slate-800 bg-slate-100" };
                const costFormatted = ev.cost ? `$${parseInt(ev.cost).toLocaleString('es-CL')}` : "$0";
                const mediaString = (ev.media && ev.media.length > 0) ? ev.media.join(", ") : "-";

                tr.innerHTML = `
                    <td class="px-4 py-3 whitespace-nowrap text-xs font-bold text-slate-500">${formatSpanishDate(ev.date)}</td>
                    <td class="px-4 py-3 font-bold text-slate-900 text-xs">${ev.title}</td>
                    <td class="px-4 py-3 whitespace-nowrap">
                        <span class="px-2.5 py-1 rounded-full text-[9px] font-extrabold ${catInfo.labelStyle}">${catInfo.label}</span>
                    </td>
                    <td class="px-4 py-3 text-xs text-slate-500">${mediaString}</td>
                    <td class="px-4 py-3 whitespace-nowrap">
                        <span class="bg-blue-600 text-white text-[9px] font-extrabold px-2.5 py-1 rounded-full shadow-2xs">${ev.segment}</span>
                    </td>
                    <td class="px-4 py-3 text-xs truncate max-w-[150px]">${ev.location || "N/A"}</td>
                    <td class="px-4 py-3 text-xs font-bold text-slate-800">${costFormatted}</td>
                    <td class="px-4 py-3 text-center">
                        <div class="flex items-center justify-center space-x-1">
                            <button onclick="openDrawer('${ev.id}')" class="p-1 hover:bg-slate-100 rounded text-slate-500 hover:text-slate-900" title="Ver Detalle"><svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0zm-3-9c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-9.543 7c-4.477 0-8.268-2.943-9.542-7z"></path></svg></button>
                            <button onclick="editEvent('${ev.id}')" class="p-1 hover:bg-slate-100 rounded text-slate-500 hover:text-blue-600" title="Editar"><svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg></button>
                            <button onclick="duplicateEvent('${ev.id}')" class="p-1 hover:bg-slate-100 rounded text-slate-500 hover:text-emerald-600" title="Duplicar"><svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg></button>
                            <button onclick="triggerDelete('${ev.id}')" class="p-1 hover:bg-slate-100 rounded text-slate-500 hover:text-red-600" title="Eliminar"><svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function renderCharts() {
            const filtered = getFilteredEvents();
            
            const monthHist = Array(12).fill(0);
            filtered.forEach(e => {
                const dateObj = new Date(e.date + "T00:00:00"); 
                if (!isNaN(dateObj.getTime())) monthHist[dateObj.getMonth()]++;
            });

            const barContainer = document.getElementById("chart-monthly-bars");
            barContainer.innerHTML = "";
            const maxVal = Math.max(...monthHist, 1);

            monthHist.forEach((count, idx) => {
                const pct = (count / maxVal) * 100;
                const barWrapper = document.createElement("div");
                barWrapper.className = "flex flex-col items-center flex-1 group relative cursor-pointer";
                barWrapper.innerHTML = `
                    <div class="text-[9px] font-bold text-slate-700 opacity-0 group-hover:opacity-100 transition-all absolute -top-6 bg-slate-800 text-white px-1.5 py-0.5 rounded shadow-lg pointer-events-none z-10 whitespace-nowrap">
                        ${count} actividades
                    </div>
                    <div class="w-5 bg-gradient-to-t from-bciBlue to-bciLightBlue rounded-t transition-all duration-500 group-hover:from-blue-500 group-hover:to-indigo-400" style="height: ${Math.max(pct, 4)}%"></div>
                `;
                barContainer.appendChild(barWrapper);
            });

            const catCounts = {};
            Object.keys(marketingCategories).forEach(k => catCounts[k] = 0);
            filtered.forEach(e => {
                if (catCounts[e.category] !== undefined) catCounts[e.category]++;
            });

            const maxCatVal = Math.max(...Object.values(catCounts), 1);
            const rowContainer = document.getElementById("chart-category-rows");
            rowContainer.innerHTML = "";

            Object.keys(catCounts).forEach(k => {
                const count = catCounts[k];
                const cat = marketingCategories[k];
                const pct = (count / maxCatVal) * 100;

                rowContainer.innerHTML += `
                    <div class="flex flex-col gap-1">
                        <div class="flex justify-between text-[10px] font-bold text-slate-700">
                            <span class="flex items-center gap-1">
                                <span class="w-2.5 h-2.5 rounded ${cat.color}"></span>
                                <span>${cat.label}</span>
                            </span>
                            <span>${count} (${Math.round((count/Math.max(filtered.length,1))*100)}%)</span>
                        </div>
                        <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                            <div class="h-full ${cat.color} rounded-full transition-all duration-500" style="width: ${pct}%"></div>
                        </div>
                    </div>
                `;
            });

            if (filtered.length > 0) {
                const segCounts = {};
                filtered.forEach(e => { segCounts[e.segment] = (segCounts[e.segment] || 0) + 1; });
                let topSeg = "N/A"; let topSegCount = 0;
                Object.keys(segCounts).forEach(s => {
                    if (segCounts[s] > topSegCount) { topSegCount = segCounts[s]; topSeg = s; }
                });
                document.getElementById("stats-peak-segment").innerText = topSeg;
                document.getElementById("stats-peak-value").innerText = topSegCount;

                const totalCost = filtered.reduce((acc, curr) => acc + (parseInt(curr.cost) || 0), 0);
                document.getElementById("stats-total-cost").innerText = `$${totalCost.toLocaleString('es-CL')}`;
            } else {
                document.getElementById("stats-peak-segment").innerText = "N/A";
                document.getElementById("stats-peak-value").innerText = "0";
                document.getElementById("stats-total-cost").innerText = "$0";
            }

            const regionalEvents = filtered.filter(e => {
                const titleMatch = e.title.toLowerCase().match(/(gira|región|antofagasta|viña|osorno|varas|serena)/);
                const locMatch = e.location.toLowerCase().match(/(chicureo|chile|viña|osorno|varas|serena)/);
                return titleMatch || locMatch;
            });
            document.getElementById("stats-regional-count").innerText = `${regionalEvents.length} Hitos`;
        }

        function openDrawer(eventId) {
            selectedEventId = eventId;
            const ev = events.find(e => e.id === eventId);
            if (!ev) return;

            document.getElementById("drawer-panel").classList.remove("hidden");
            document.getElementById("drawer-id-label").innerText = `ID: ${ev.id}`;
            document.getElementById("drawer-event-title").innerText = ev.title;
            document.getElementById("drawer-event-date").innerText = formatSpanishDate(ev.date);
            document.getElementById("drawer-location").innerText = ev.location || "N/A";
            document.getElementById("drawer-media").innerText = (ev.media && ev.media.length > 0) ? ev.media.join(", ") : "Ninguno";
            document.getElementById("drawer-responsable").innerText = ev.responsable || "N/A";
            document.getElementById("drawer-contraparte").innerText = ev.contraparte || "N/A";
            document.getElementById("drawer-description").innerText = ev.description || "Sin notas adicionales registradas.";
            document.getElementById("drawer-cost").innerText = ev.cost ? `$${parseInt(ev.cost).toLocaleString('es-CL')}` : "$0";
            document.getElementById("drawer-guests").innerText = ev.invitados ? parseInt(ev.invitados).toLocaleString('es-CL') : "0";
            document.getElementById("drawer-medicion").innerText = ev.medicionType ? `${ev.medicionType}: ${ev.medicionValue || '(Sin valor)'}` : "Sin medición asociada";

            const badge = document.getElementById("drawer-category-badge");
            const catInfo = marketingCategories[ev.category] || { label: "Otros", labelStyle: "text-slate-800 bg-slate-100" };
            badge.innerText = catInfo.label;
            badge.className = `px-2.5 py-1 rounded-full text-[9px] font-extrabold uppercase tracking-wider inline-block ${catInfo.labelStyle}`;
            document.getElementById("drawer-tags-container").innerHTML = `<span class="bg-bciSegmentBlue text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-sm">${ev.segment}</span>`;
        }

        function closeDrawer() {
            document.getElementById("drawer-panel").classList.add("hidden");
            selectedEventId = null;
        }

        function openEventModal() {
            document.getElementById("form-event-id").value = "";
            document.getElementById("form-title").value = "";
            document.getElementById("form-date").value = "2026-06-04"; 
            document.getElementById("form-category").value = "eventos";
            document.getElementById("form-segment").value = "BAM";
            document.getElementById("form-location").value = "";
            document.getElementById("form-responsable").value = "";
            document.getElementById("form-contraparte").value = "";
            document.getElementById("form-description").value = "";
            document.getElementById("form-cost").value = "";
            document.getElementById("form-guests").value = "";
            document.getElementById("form-medicion-type").value = "";
            document.getElementById("form-medicion-value").value = "";
            document.getElementById("form-medicion-value").disabled = true;
            document.getElementById("form-medicion-value").classList.add("bg-slate-100", "cursor-not-allowed");
            document.querySelectorAll('#form-media-group input[type="checkbox"]').forEach(cb => cb.checked = false);

            document.getElementById("modal-title").innerText = "Nueva Actividad de Marketing";
            document.getElementById("event-modal").classList.remove("hidden");
        }

        function openEventModalWithDate(dateStr) {
            openEventModal();
            document.getElementById("form-date").value = dateStr;
        }

        function closeEventModal() {
            document.getElementById("event-modal").classList.add("hidden");
        }

        function handleMedicionTypeChange() {
            const select = document.getElementById("form-medicion-type");
            const valueInput = document.getElementById("form-medicion-value");
            if (select.value) {
                valueInput.disabled = false;
                valueInput.placeholder = "Ej: 95% de aprobación, 3.4k impresiones...";
                valueInput.classList.remove("bg-slate-100", "cursor-not-allowed");
            } else {
                valueInput.disabled = true;
                valueInput.value = "";
                valueInput.placeholder = "Selecciona un tipo primero";
                valueInput.classList.add("bg-slate-100", "cursor-not-allowed");
            }
        }

        function editEvent(id) {
            closeDrawer();
            const ev = events.find(e => e.id === id);
            if (!ev) return;

            document.getElementById("form-event-id").value = ev.id;
            document.getElementById("form-title").value = ev.title;
            document.getElementById("form-date").value = ev.date;
            document.getElementById("form-category").value = ev.category;
            document.getElementById("form-segment").value = ev.segment;
            document.getElementById("form-location").value = ev.location || "";
            document.getElementById("form-responsable").value = ev.responsable || "";
            document.getElementById("form-contraparte").value = ev.contraparte || "";
            document.getElementById("form-description").value = ev.description || "";
            document.getElementById("form-cost").value = ev.cost || "";
            document.getElementById("form-guests").value = ev.invitados || "";
            document.getElementById("form-medicion-type").value = ev.medicionType || "";
            document.getElementById("form-medicion-value").value = ev.medicionValue || "";
            handleMedicionTypeChange();

            document.querySelectorAll('#form-media-group input[type="checkbox"]').forEach(cb => {
                cb.checked = ev.media ? ev.media.includes(cb.value) : false;
            });

            document.getElementById("modal-title").innerText = "Editar Actividad";
            document.getElementById("event-modal").classList.remove("hidden");
        }

        function editCurrentDrawerEvent() {
            if (selectedEventId) editEvent(selectedEventId);
        }

        function duplicateEvent(id) {
            const ev = events.find(e => e.id === id);
            if (!ev) return;

            const newId = "ev_" + Date.now() + "_" + Math.floor(Math.random() * 1000);
            const duplicatedEvent = { ...ev, id: newId, title: ev.title + " (Copia)" };
            events.push(duplicatedEvent);
            saveStateToLocalStorage();
            updateDashboard();
            showToast("Actividad duplicada exitosamente", "success");
        }

        function duplicateCurrentDrawerEvent() {
            if (selectedEventId) { duplicateEvent(selectedEventId); closeDrawer(); }
        }

        function saveEventForm(e) {
            e.preventDefault();

            const id = document.getElementById("form-event-id").value || "ev_" + Date.now();
            const title = document.getElementById("form-title").value.trim();
            const date = document.getElementById("form-date").value;
            const category = document.getElementById("form-category").value;
            const segment = document.getElementById("form-segment").value;
            const location = document.getElementById("form-location").value.trim();
            const responsable = document.getElementById("form-responsable").value.trim();
            const contraparte = document.getElementById("form-contraparte").value.trim();
            const description = document.getElementById("form-description").value.trim();
            const cost = parseInt(document.getElementById("form-cost").value) || 0;
            const invitados = parseInt(document.getElementById("form-guests").value) || 0;
            const medicionType = document.getElementById("form-medicion-type").value;
            const medicionValue = document.getElementById("form-medicion-value").value.trim();

            const selectedMedia = [];
            document.querySelectorAll('#form-media-group input[type="checkbox"]:checked').forEach(cb => selectedMedia.push(cb.value));

            const newEvent = { 
                id, title, date, category, segment, location, responsable, 
                contraparte, description, cost, invitados, medicionType, 
                medicionValue, media: selectedMedia 
            };

            const idx = events.findIndex(item => item.id === id);
            if (idx > -1) {
                events[idx] = newEvent;
            } else {
                events.push(newEvent);
            }
            
            updateDashboard();
            closeEventModal();
            showToast("Guardando en Google Drive...", "info");

            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newEvent)
            }).then(() => {
                showToast("¡Guardado exitoso en el Excel!", "success");
            }).catch(err => {
                console.error("Error al guardar en Drive:", err);
                showToast("Error al conectar con Drive", "error");
            });
        }

        function triggerDelete(id) {
            const ev = events.find(e => e.id === id);
            if (!ev) return;
            eventIdToDelete = id;
            document.getElementById("delete-confirm-text").innerText = `¿Estás completamente seguro de que deseas eliminar "${ev.title}"?`;
            document.getElementById("delete-confirm-modal").classList.remove("hidden");
        }

        function confirmDeleteAction() {
            if (eventIdToDelete) {
                events = events.filter(e => e.id !== eventIdToDelete);
                saveStateToLocalStorage();
                updateDashboard();
                showToast("Actividad eliminada", "info");
                closeDeleteConfirmModal();
                closeDrawer();
            }
        }

        function triggerCustomDelete() {
            if (selectedEventId) triggerDelete(selectedEventId);
        }

        function closeDeleteConfirmModal() {
            document.getElementById("delete-confirm-modal").classList.add("hidden");
            eventIdToDelete = null;
        }

        function formatSpanishDate(dateStr) {
            if (!dateStr) return "Sin fecha";
            const months = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
            const parts = dateStr.split("-");
            if (parts.length === 3) {
                const day = parseInt(parts[2]);
                const monthIdx = parseInt(parts[1]) - 1;
                const year = parts[0];
                return `${day} ${months[monthIdx]}, ${year}`;
            }
            return dateStr;
        }

        function showToast(message, type = "info") {
            const toast = document.getElementById("toast-notification");
            const text = document.getElementById("toast-text");
            const wrapper = document.getElementById("toast-icon-wrapper");
            const icon = document.getElementById("toast-icon");

            text.innerText = message;
            
            if (type === "success") {
                wrapper.className = "p-1 rounded-lg bg-emerald-500 text-white";
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>';
            } else if (type === "error") {
                wrapper.className = "p-1 rounded-lg bg-red-500 text-white";
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>';
            } else {
                wrapper.className = "p-1 rounded-lg bg-blue-500 text-white";
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
            }

            toast.classList.remove("translate-y-24", "opacity-0");
            
            setTimeout(() => {
                toast.classList.add("translate-y-24", "opacity-0");
            }, 3000);
        }
    </script>
